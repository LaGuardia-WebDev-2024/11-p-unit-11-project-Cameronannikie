<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Atlanta</button>
    <button id="mem2-button">Food</button>
    <button id="mem3-button">Baby</button>
    <h1>My Top 3 Memories of <span>This Year</span></h1>
    <ol>
      <li>
        <h3 id="mem1">My trip to Atlanta</h3>
        <p>More about this memory.</p>
        <img class="Atlanta" src="https://m.media-amazon.com/images/I/41OuvwcI+uL._AC_UF894,1000_QL80_.jpg"
      </li>
    

      <li>
        <h3 id="mem2">My favorite foods </h3>
        <p>memory2.</p>
        <img id="food">
      </li>

      <li>
        <h3 id="mem3">Be a parent for the day project</h3>
        <p>More about this memory</p>
        <img id="baby">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

    $(".Atlanta").hide();
// ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
        $("#mem1").text("Look at some pictures from Atlanta!");
        $("body").css("backgroundColor", "red");  
        $(".Atlanta").show(2000);
      });
 
      $(".Food").hide();
      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "blue");
         $("#mem2").text("Look at some pictures of my favorite foods!");
           $("body").css("backgroundColor", "green")
           $("#food").attr("src","https://img.sndimg.com/food/image/upload/f_auto,c_thumb,q_55,w_744,ar_5:4/v1/img/recipes/21/76/8/lb8SfvjlSkCJmD40ZBvA_beans%20and%20chicken-1.jpg");
           $("body").css("backgroundColor", "purple")
          $(".Food").show(2000);
      });

        $(".Baby").hide();
 // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "purple");
        $("#mem3").text("Become a parent for a day project");
        $("body").css("backgroundColor", "green")
         $("#baby").attr("src","https://media-cldnry.s-nbcnews.com/image/upload/t_fit-760w,f_auto,q_auto:best/rockcms/2024-05/grumpy-baby-faces-mc-240523-03-3566ac.jpg");
$(".Baby").show(2000);
      });
   
   
   
   
   
   </script>
  </body>
</html>
